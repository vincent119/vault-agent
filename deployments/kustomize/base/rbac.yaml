---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vault-agent-cluster-role
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: vault-agent
subjects:
  - kind: ServiceAccount
    name: vault-agent
    namespace: vault-agent
roleRef:
  kind: ClusterRole
  name: vault-agent-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
# 允許 vault-agent 使用 Kubernetes TokenReview API（Vault Kubernetes Auth 所需）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-agent-tokenreview-binding
  namespace: vault-agent
subjects:
  - kind: ServiceAccount
    name: vault-agent
    namespace: vault-agent
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
